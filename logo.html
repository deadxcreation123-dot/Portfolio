<!DOCTYPE html>
<html>
<head>
  <title>Logos</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>

<h1 style="text-align:center; color:white;">All Projects</h1>

<!-- Thumbnails Section -->
<section class="thumbnails">
  <h2>Logo Designs</h2>

  <div class="grid">
    <img src="images/logo/logo1.jpg">
    <img src="images/logo/logo2.jpg">
    <img src="images/logo/logo3.jpg">
    <img src="images/logo/logo4.jpg">
    <img src="images/logo/logo5.jpg">
    <img src="images/logo/logo6.jpg">
    <img src="images/logo/logo7.jpg">
    <img src="images/logo/logo8.jpg">
    <img src="images/logo/logo9.png">
    <img src="images/logo/logo10.png">
    <img src="images/logo/logo11.png">
    <img src="images/logo/logo12.png">

  </div>
  <a href="index.html" class="Home-btn">Home</a>
</section>

</body>
<script>
const slug = new URLSearchParams(window.location.search).get("slug");

fetch("/projects.json")
  .then(res => res.json())
  .then(data => {
    const project = data.find(p => p.slug === slug);

    let html = `
      <h1>${project.title}</h1>
      <p>${project.short}</p>
      <div class="gallery">
    `;

    project.samples.forEach(img => {
      html += `<img src="${img}" />`;
    });

    html += `</div>`;

    document.getElementById("project").innerHTML = html;
  });
</script>
</html>
