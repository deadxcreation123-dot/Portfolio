<!DOCTYPE html>
<html>
<head>
  <title>Post Designs</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>

<h1 style="text-align:center; color:white;">All Projects</h1>

<!-- Thumbnails Section -->
<section class="thumbnails">
  <h2>Post Designs</h2>

  <div class="grid">
    <img src="images/post/post1.jpg">
    <img src="images/post/post2.jpg">
    <img src="images/post/post3.jpg">
    <img src="images/post/post4.jpg">
    <img src="images/post/post5.jpg">
    <img src="images/post/post6.jpg">
    <img src="images/post/post7.jpg">
    <img src="images/post/post8.jpg">
    <img src="images/post/post9.jpg">
    <img src="images/post/post10.jpg">
    <img src="images/post/post11.jpg">
    <img src="images/post/post12.jpg">
  </div>
  <a href="index.html" class="Home-btn">Home</a>
</section>

</body>
<script>
const slug = new URLSearchParams(window.location.search).get("slug");

fetch("/projects.json")
  .then(res => res.json())
  .then(data => {
    const project = data.find(p => p.slug === slug);

    let html = `
      <h1>${project.title}</h1>
      <p>${project.short}</p>
      <div class="gallery">
    `;

    project.samples.forEach(img => {
      html += `<img src="${img}" />`;
    });

    html += `</div>`;

    document.getElementById("project").innerHTML = html;
  });
</script>
</html>
